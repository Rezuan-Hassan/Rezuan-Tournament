<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezuan-Championship | Pro Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-trophy"></i> REZUAN CHAMPIONSHIP</h1>
            <p class="subtitle">Pro Esports Bracket Manager</p>
        </header>

        <div id="setup-section" class="card">
            <div class="input-group">
                <label>Tournament Size:</label>
                <select id="maxTeams">
                    <option value="4">4 Teams</option>
                    <option value="8">8 Teams</option>
                    <option value="16">16 Teams</option>
                    <option value="32">32 Teams</option>
                </select>
            </div>
            
            <div class="input-group">
                <input type="text" id="teamInput" placeholder="Enter Team Name...">
                <button onclick="addTeam()" class="action-btn">Add</button>
            </div>
            <p class="status">Registered: <span id="count">0</span> / <span id="limit-text">4</span></p>
        </div>

        <div id="bracket-container" class="bracket-wrapper">
            <div id="bracket" class="bracket"></div>
        </div>

        <div id="champion-display" class="champion-card hidden">
            <h2>🏆 CHAMPION: <span id="winner-name">TBD</span></h2>
            <button onclick="location.reload()" class="reset-btn">New Tournament</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
